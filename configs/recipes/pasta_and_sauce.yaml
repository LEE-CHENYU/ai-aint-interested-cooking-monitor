# Demo recipe: Pasta with Tomato Sauce
# Completion types: vlm (VLM detects), timer (countdown), user_confirm (press Enter)

dish: "Pasta with Tomato Sauce"
servings: 2
estimated_time_minutes: 25

steps:
  - id: 1
    instruction: "Fill pot with water and bring to a rolling boil"
    completion_type: vlm
    vlm_signal: "water is at a rolling boil"
    depends_on: []

  - id: 2
    instruction: "Dice onion and mince garlic while water heats"
    completion_type: timer
    timer_seconds: 300
    depends_on: []
    parallel_group: "prep"

  - id: 3
    instruction: "Add pasta to the boiling water"
    completion_type: user_confirm
    depends_on: [1]

  - id: 4
    instruction: "Cook pasta until al dente"
    completion_type: timer
    timer_seconds: 480
    depends_on: [3]

  - id: 5
    instruction: "Saute garlic and onion, then add tomato sauce"
    completion_type: timer
    timer_seconds: 600
    depends_on: [2]
    parallel_group: "cooking"

  - id: 6
    instruction: "Drain pasta and combine with sauce"
    completion_type: user_confirm
    depends_on: [4, 5]
